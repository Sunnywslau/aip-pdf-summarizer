<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AIP/AIC Summarizer Settings</title>
  <style>
    :root {
      --bg-color: #0f172a;
      --card-bg: #1e293b;
      --text-color: #f8fafc;
      --text-muted: #94a3b8;
      --primary: #3b82f6;
      --primary-hover: #2563eb;
      --accent: #10b981;
      --border-color: #334155;
      --font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: var(--font-family);
      margin: 0;
      padding: 40px 20px;
      display: flex;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 600px;
      background: var(--card-bg);
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
      border: 1px solid var(--border-color);
    }

    h1 {
      font-size: 24px;
      margin-top: 0;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #60a5fa, #34d399);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: 700;
    }

    p.subtitle {
      color: var(--text-muted);
      margin-bottom: 32px;
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 24px;
    }

    label {
      display: block;
      font-weight: 600;
      margin-bottom: 8px;
      font-size: 14px;
      color: var(--text-color);
    }

    input[type="text"], input[type="password"], textarea, select {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid var(--border-color);
      background-color: #0f172a;
      color: var(--text-color);
      box-sizing: border-box;
      font-size: 14px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.25);
    }

    textarea {
      resize: vertical;
      min-height: 150px;
      font-family: inherit;
    }

    .btn {
      background-color: var(--primary);
      color: white;
      border: none;
      padding: 12px 24px;
      font-size: 14px;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.2s, transform 0.1s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .btn:hover {
      background-color: var(--primary-hover);
    }

    .btn:active {
      transform: scale(0.98);
    }

    .status-msg {
      margin-left: 16px;
      font-size: 14px;
      font-weight: 500;
      color: var(--accent);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .status-msg.show {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>AIP/AIC Summarizer Settings</h1>
    <p class="subtitle">Configure your LLM provider settings and customization prompt instructions.</p>

    <div class="form-group">
      <label for="provider">LLM Provider</label>
      <select id="provider">
        <option value="deepseek">DeepSeek (Recommended for HK - Direct Access)</option>
        <option value="gemini">Google Gemini</option>
      </select>
    </div>

    <div class="form-group" id="deepseekKeyGroup">
      <label for="deepseekApiKey">DeepSeek API Key</label>
      <input type="password" id="deepseekApiKey" placeholder="Enter your DeepSeek API Key...">
    </div>

    <div class="form-group" id="geminiKeyGroup" style="display: none;">
      <label for="geminiApiKey">Gemini API Key</label>
      <input type="password" id="geminiApiKey" placeholder="Enter your Gemini API Key...">
    </div>

    <div class="form-group">
      <label for="model">Model</label>
      <select id="model">
        <!-- Will be populated dynamically based on provider -->
      </select>
    </div>

    <div class="form-group" id="customModelGroup" style="display: none;">
      <label for="customModel">Custom Model Name</label>
      <input type="text" id="customModel" placeholder="e.g., deepseek-chat">
    </div>

    <div class="form-group">
      <label for="systemPrompt">System Instruction / Prompt</label>
      <textarea id="systemPrompt" placeholder="Instruction to guide the AI summarization..."></textarea>
    </div>

    <div style="display: flex; align-items: center;">
      <button id="saveBtn" class="btn">Save Configuration</button>
      <span id="status" class="status-msg">Settings saved successfully!</span>
    </div>
  </div>

  <script src="options.js"></script>
</body>
</html>
