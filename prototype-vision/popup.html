<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Change Bar Detector Prototype</title>
  <style>
    :root {
      --bg-color: #0b0f19;
      --card-bg: #161e2e;
      --text-color: #f3f4f6;
      --text-muted: #9ca3af;
      --primary: #3b82f6;
      --primary-hover: #2563eb;
      --accent: #10b981;
      --border-color: #374151;
      --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: var(--font-family);
      margin: 0;
      padding: 16px;
      width: 420px;
      box-sizing: border-box;
    }

    h1 {
      font-size: 16px;
      margin: 0 0 12px 0;
      background: linear-gradient(135deg, #60a5fa, #34d399);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: 700;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 8px;
    }

    .form-group {
      margin-bottom: 12px;
    }

    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    input[type="text"], input[type="password"], input[type="number"], select {
      width: 100%;
      padding: 8px 10px;
      border-radius: 6px;
      border: 1px solid var(--border-color);
      background-color: #0b0f19;
      color: var(--text-color);
      box-sizing: border-box;
      font-size: 13px;
    }

    input:focus, select:focus {
      outline: none;
      border-color: var(--primary);
    }

    .row {
      display: flex;
      gap: 12px;
    }

    .col {
      flex: 1;
    }

    .btn {
      width: 100%;
      background-color: var(--primary);
      color: white;
      border: none;
      padding: 10px;
      font-size: 13px;
      font-weight: 600;
      border-radius: 6px;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    .btn:hover {
      background-color: var(--primary-hover);
    }

    .btn:disabled {
      background-color: var(--border-color);
      color: var(--text-muted);
      cursor: not-allowed;
    }

    .status-container {
      margin-top: 12px;
      background: rgba(30, 41, 59, 0.4);
      padding: 8px 12px;
      border-radius: 6px;
      border: 1px dashed var(--border-color);
      font-size: 11px;
      color: var(--text-muted);
      display: none;
    }

    .result-container {
      margin-top: 12px;
      background: var(--card-bg);
      padding: 12px;
      border-radius: 8px;
      border: 1px solid var(--border-color);
      font-size: 13px;
      line-height: 1.5;
      max-height: 250px;
      overflow-y: auto;
      display: none;
    }

    .result-container h3 {
      margin-top: 0;
      margin-bottom: 6px;
      font-size: 13px;
      color: #60a5fa;
    }

    .result-container p {
      margin: 0;
      white-space: pre-wrap;
    }
  </style>
  <script src="pdf.min.js"></script>
</head>
<body>
  <h1>Change Bar Vision Detector (Prototype)</h1>

  <div class="form-group">
    <label for="githubToken">GitHub Token (PAT)</label>
    <input type="password" id="githubToken" placeholder="GitHub Personal Access Token...">
  </div>

  <div class="row">
    <div class="col form-group">
      <label for="startPage">Start Page</label>
      <input type="number" id="startPage" value="1" min="1">
    </div>
    <div class="col form-group">
      <label for="endPage">End Page</label>
      <input type="number" id="endPage" value="3" min="1">
    </div>
  </div>

  <button id="runBtn" class="btn">Run Vision Analysis</button>

  <div id="statusContainer" class="status-container"></div>
  <div id="resultContainer" class="result-container">
    <h3>Detected Changes & Procedures:</h3>
    <div id="resultText"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
